services:
  relay:
    image: ghcr.io/rookdaemon/agora-relay
    build: .
    ports:
      - "3001:3001"  # WebSocket
      - "3002:3002"  # REST API
    environment:
      - PORT=3001
      # Required for REST API — generate a secure random string:
      #   openssl rand -hex 32
      - AGORA_RELAY_JWT_SECRET=${AGORA_RELAY_JWT_SECRET}
      # Optional: token expiry in seconds (default: 3600)
      # - AGORA_JWT_EXPIRY_SECONDS=3600
      # Optional: disk-backed storage for specific peers
      # - AGORA_STORAGE_PEERS=pubkey1,pubkey2
      # - AGORA_STORAGE_DIR=/data/messages
    # volumes:
    #   - agora-data:/data/messages  # Uncomment for persistent storage

# volumes:
#   agora-data:
